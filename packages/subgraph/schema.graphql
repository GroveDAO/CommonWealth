type Proposal @entity {
  id: ID!
  proposer: Bytes!
  metadataURI: String!
  requestedAmount: BigInt!
  beneficiary: Bytes!
  conviction: BigInt!
  totalStaked: BigInt!
  executed: Boolean!
  cancelled: Boolean!
  createdAt: BigInt!
  updatedAt: BigInt!
  votes: [Vote!]! @derivedFrom(field: "proposal")
}

type Vote @entity {
  id: ID!
  proposal: Proposal!
  voter: Bytes!
  amount: BigInt!
  previousStake: BigInt!
  conviction: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
}

type Attestation @entity {
  id: ID!
  contributor: Contributor!
  proofURI: String!
  descriptionURI: String!
  requestedReward: BigInt!
  confirmations: BigInt!
  rejections: BigInt!
  rewarded: Boolean!
  rejected: Boolean!
  submittedAt: BigInt!
  updatedAt: BigInt!
}

type Contributor @entity {
  id: ID!
  address: Bytes!
  reputation: BigInt!
  attestations: [Attestation!]! @derivedFrom(field: "contributor")
}

type Circle @entity {
  id: ID!
  creator: Bytes!
  name: String!
  contribution: BigInt!
  cycleDuration: BigInt!
  maxMembers: BigInt!
  token: Bytes!
  state: String!
  cycle: BigInt!
  cycleStart: BigInt!
  memberCount: BigInt!
  members: [Bytes!]!
  payoutOrder: [Bytes!]!
  currentRecipient: Bytes!
  totalContributed: BigInt!
  createdAt: BigInt!
  updatedAt: BigInt!
}

type DataSubmission @entity {
  id: ID!
  contributor: Bytes!
  metadataURI: String!
  accessURI: String!
  dataType: String!
  quality: BigInt!
  reward: BigInt!
  verified: Boolean!
  claimed: Boolean!
  submittedAt: BigInt!
  updatedAt: BigInt!
}
